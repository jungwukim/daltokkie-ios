# DalTokkie iOS 앱 — xcodegen 프로젝트 정의
# 생성: xcodegen generate
name: DalTokkie
options:
  bundleIdPrefix: com.daltokkie
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  DalTokkieEngine:
    path: Engine

targets:
  DalTokkie:
    type: application
    platform: iOS
    sources:
      - App
    dependencies:
      - package: DalTokkieEngine
        product: SajuKit
      - package: DalTokkieEngine
        product: NatalKit
      - package: DalTokkieEngine
        product: ZiweiKit
      - package: DalTokkieEngine
        product: LunarKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: "달토끼"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
